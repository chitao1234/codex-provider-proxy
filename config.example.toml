# codex-provider-proxy example config
# Set to 0.0.0.0:8080 to accept non-loopback clients (they currently always use default_provider).
# The legacy singular `listen_addr` key is still accepted, but `listen_addrs` supports multiple listeners.
listen_addrs = ["127.0.0.1:8080"]
# Requests must be sent to this path prefix. Example: "/v1" means the proxy accepts /v1/* and forwards only the suffix.
listen_base_path = "/v1"
# Set to a non-loopback address (for example 0.0.0.0:8081) to allow non-loopback RPC clients.
rpc_listen_addr = "127.0.0.1:8081"
# Optional: if set, RPC requires `Authorization: Bearer <rpc_token>` (recommended when exposing RPC beyond localhost)
# rpc_token = "replace-me"
# Close proxied connections if upstream sends no data (including response headers/body) for this many seconds.
# The timeout is applied while uploading request bodies and downloading response bodies.
# Set to 0 to disable idle-timeout termination.
upstream_idle_timeout_secs = 120
default_provider = "provider_a"

[logging]
level = "info"
# Optional extra tracing filter directives appended after `level`.
# rule = "codex_provider_proxy=debug,hyper=warn"
log_requests = true
log_responses = true
log_bodies = false
max_body_log_bytes = 8192
# Optional: when set, writes per-exchange files under this directory
# (metadata, headers, raw request body, raw response body).
# exchange_log_dir = "./logs/exchanges"
# Best-effort reconstruction for URLs ending in `responses`.
# This only affects file output and never alters proxy behavior.
reconstruct_responses = true

[providers.provider_a]
base_url = "https://api.example.com/"
api_key = "replace-me"

[providers.provider_b]
base_url = "https://api.other.example/"
api_key = "replace-me"
# You can override the full Authorization header value if you don't want Bearer auth:
# authorization_header = "Api-Key replace-me"
